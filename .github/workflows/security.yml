name: Security

on:
  push:
  schedule:
    # Catches newly-published CVEs against already-committed dependency
    # versions, not just ones introduced by a push.
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  pip-audit:
    name: Dependency CVE scan (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --locked
      - run: uv run pip-audit

  codeql:
    name: CodeQL analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v4
        with:
          languages: python
      - uses: github/codeql-action/analyze@v4
